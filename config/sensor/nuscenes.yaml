  - id: gnss
    channel: GNSS
    modality: gnss
    blueprint: sensor.other.gnss
    enabled: true
    rate_hz: 20
    transform:
      x: 0.0
      y: 0.0
      z: 2.0
      roll: 0.0
      pitch: 0.0
      yaw: 0.0

  - id: imu
    channel: IMU
    modality: imu
    blueprint: sensor.other.imu
    enabled: true
    rate_hz: 20
    transform:
      x: 0.0
      y: 0.0
      z: 2.0
      roll: 0.0
      pitch: 0.0
      yaw: 0.0

  - id: occ_grid
    channel: OCC_GT
    modality: occupancy
    enabled: true
    rate_hz: 20
    transform:
      x: 0.0
      y: 0.0
      z: 0.0
      roll: 0.0
      pitch: 0.0
      yaw: 0.0
    output:
      x_min_m: -100.0
      x_max_m: 100.0
      y_min_m: -100.0
      y_max_m: 100.0
      z_min_m: -2.0
      z_max_m: 4.0
      resolution_m: 0.5
      include_categories:
        - vehicle
        - pedestrian
