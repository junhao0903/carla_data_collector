description: "Front 3-camera test layout"
trajectory_vis: true   # 轨迹可视化
sensors:
  - id: cam_front
    channel: CAM_FRONT
    modality: camera_rgb
    blueprint: sensor.camera.rgb
    enabled: true
    rate_hz: 20
    depth: true         # 生成深度图
    depth_vis: true        # 深度图可视化
    semantic: true         # 生成语义分割图
    semantic_vis: true     # 语义分割可视化
    annotation_vis: true   # 标注可视化
    transform:
      x: 1.5
      y: 0.0
      z: 1.6
      roll: 0.0
      pitch: 0.0
      yaw: 0.0
    output:
      width: 1600
      height: 900
      fov: 70

