# Annotation filter config
# max_range: range filter (overall_filter_annotations)
# min_pts / pts_per_m3: point-count filter (annotate_lidar)

max_range: 100.0         # meters — baselink range filter
min_pts: 3               # minimum point floor (for tiny objects)
pts_per_m3: 1.5           # points per m³; bbox vol × pts_per_m3 = threshold
