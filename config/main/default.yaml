# CARLA 仿真数据采集器 — 主配置
# 用法: python run.py [<config_name>.yaml]

carla:
  host: 127.0.0.1          # CARLA 服务地址
  port: 2000               # CARLA RPC 端口
  timeout_seconds: 60.0    # 客户端超时 (nuscenes 6相机+LiDAR 需较大值)
  map: Town10HD             # 要加载的地图 (Town01–Town07, Town10HD)
  weather: ClearNoon       # 天气预设 (ClearNoon, CloudyNoon, HardRainNoon, WetSunset...)
  fps: 20                  # 同步模式下的仿真帧率
  auto_launch: false       # 不在 run.py 中启动 CARLA (推荐手动启动后直连)
  startup_wait_seconds: 180  # 等待 CARLA 启动的最大秒数
  launch_command:          # CARLA 启动命令
    - /home/adt/script/carlaUE4.sh
    - -RenderOffScreen     # 无头渲染（不显示窗口）

vehicle:
  model: model3            # 自车车型 (对应 blueprint: vehicle.tesla.model3)

traffic:
  vehicle_count: 10
  min_vehicle_count: 1     # 最少需成功生成的 NPC 数 (不够则报错)
  npc_seed: 42             # NPC 随机种子

collection:
  output_dir: output       # 数据输出根目录
  duration_seconds: 20      # 采集时长 (秒), 0 = 不限时, Ctrl+C 退出
  synchronous: true        # 同步模式 (建议开启, 保证数据帧率稳定)
  warmup_ticks: 10         # 预热 ticks (传感器稳定期, 不记录数据)
  motion_speed_kmh: 5       # 车速达到此值 (km/h) 开始采集
  motion_consecutive_ticks: 1   # 达到速度后立即开始采集
  motion_timeout_ticks: 500     # 等待加速的最大 tick 数

ground_truth:
  annotation_filter: default.yaml    # LiDAR 配置 (config/filter/), 用于过滤无效 annotation

sensor_layout: nuscenes.yaml  # 传感器布局文件 (自动查找 config/sensor/ 目录)
